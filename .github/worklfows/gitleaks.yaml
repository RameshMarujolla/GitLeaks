name: GitLeaks

on:
  pull_request:
  push:
    branches:
    - main

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: gitleaks/gitleaks-action@v2
      - name: Run GitLeaks
        run: |
          gitleaks git \
            --report-format sarif \
            --report-path results.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif
